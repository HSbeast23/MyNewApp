apply plugin: 'com.android.application'
apply plugin: 'com.google.gms.google-services'  // Firebase Google Services plugin
apply plugin: 'com.facebook.react'               // React Native plugin

android {
    compileSdkVersion rootProject.compileSdkVersion

    defaultConfig {
        applicationId "com.haarhish.MyNewApp"    // Your exact package name here
        minSdkVersion rootProject.minSdkVersion
        targetSdkVersion rootProject.targetSdkVersion
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    // Optional: Java/Kotlin compatibility
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = "17"
    }
}

dependencies {
    implementation 'com.facebook.react:react-native:+'

    // Firebase BoM (Bill of Materials) to manage versions
    implementation platform('com.google.firebase:firebase-bom:32.2.3')

    // Firebase Authentication
    implementation 'com.google.firebase:firebase-auth'

    // Google Sign-In dependency
    implementation 'com.google.android.gms:play-services-auth:20.7.0'

    // Other dependencies you might need
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.annotation:annotation:1.6.0'
}

// Ensure this is at the bottom to apply the Google Services plugin
apply plugin: 'com.google.gms.google-services'
