// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    // ✅ Android Gradle Plugin — must have
    classpath('com.android.tools.build:gradle:8.0.2') // Or your version

    // ✅ React Native plugin — must have
    classpath('com.facebook.react:react-native-gradle-plugin')

    // ✅ Kotlin plugin — needed for some packages
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')

    // ✅ ✅ ✅ Required for Firebase & google-services.json
    classpath('com.google.gms:google-services:4.3.15')
  }
}

// ✅ ✅ ✅ Add this block for Google Play Services Auth version (for Firebase Auth + Google Sign-In)
ext {
  buildToolsVersion = "33.0.0" // or your build tools version
  minSdkVersion = 24
  compileSdkVersion = 34
  targetSdkVersion = 34

  // You can adjust supportLibVersion if needed
  supportLibVersion = "28.0.0"

  // ✅ Pin Google Play Services Auth version
  googlePlayServicesAuthVersion = "19.2.0"
}

// ✅ Resolve react-native Android directory for autolinking
def reactNativeAndroidDir = new File(
  providers.exec {
    workingDir(rootDir)
    commandLine("node", "--print", "require.resolve('react-native/package.json')")
  }.standardOutput.asText.get().trim(),
  "../android"
)

allprojects {
  repositories {
    maven {
      // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
      url(reactNativeAndroidDir)
    }

    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

// ✅ Expo root plugin — needed for managed/bare workflow with EAS
apply plugin: "expo-root-project"

// ✅ React Native root plugin — must have
apply plugin: "com.facebook.react.rootproject"
